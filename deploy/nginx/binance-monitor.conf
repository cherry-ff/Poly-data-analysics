server {
    listen 80;
    server_name 167.160.190.152;

    root /home/ubuntu/binance-monitor-frontend/dist;
    index index.html;

    location = /poly15 {
        return 301 /poly15/;
    }

    # sync archive 单独配置：打包大文件耗时长，需要更长的超时，同时关闭缓冲以流式转发
    location /poly15/api/sync/archive {
        proxy_pass http://127.0.0.1:18080/api/sync/archive;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /poly15/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 后端 API 代理，必须写在前面
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端 SPA 路由
    location / {
        try_files $uri /index.html;
    }

    access_log /var/log/nginx/binance-monitor.access.log;
    error_log /var/log/nginx/binance-monitor.error.log;
}
